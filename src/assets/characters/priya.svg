<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 500" preserveAspectRatio="xMidYMax meet">
  <defs>
    <linearGradient id="p-scrubs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5eb0ac"/>
      <stop offset="1" stop-color="#2a5a5a"/>
    </linearGradient>
    <linearGradient id="p-pants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#46908e"/>
      <stop offset="1" stop-color="#1e4646"/>
    </linearGradient>
    <linearGradient id="p-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#daa578"/>
      <stop offset="1" stop-color="#ba8248"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="492" rx="42" ry="6" fill="rgba(0,0,0,0.32)"/>

  <!-- Hair bun behind head -->
  <ellipse cx="100" cy="32" rx="28" ry="18" fill="#2a1810"/>

  <!-- LEGS — scrub pants -->
  <path d="M 78 270 L 76 486 L 98 486 L 100 306 Z" fill="url(#p-pants)" stroke="#0a2828" stroke-width="1.4"/>
  <path d="M 100 306 L 102 486 L 124 486 L 122 270 Z" fill="url(#p-pants)" stroke="#0a2828" stroke-width="1.4"/>
  <!-- Pant fold shadow -->
  <line x1="84" y1="290" x2="82" y2="470" stroke="#0a2828" stroke-width="0.8" opacity="0.45"/>
  <line x1="116" y1="290" x2="118" y2="470" stroke="#0a2828" stroke-width="0.8" opacity="0.45"/>

  <!-- White clogs -->
  <ellipse cx="86" cy="489" rx="15" ry="6" fill="#f0ece0" stroke="#0a0e18" stroke-width="1.2"/>
  <ellipse cx="114" cy="489" rx="15" ry="6" fill="#f0ece0" stroke="#0a0e18" stroke-width="1.2"/>

  <!-- ARMS -->
  <path d="M 52 180 Q 44 215 50 265 L 70 262 Q 68 215 74 190 Z" fill="url(#p-scrubs)" stroke="#0a2828" stroke-width="1.4"/>
  <path d="M 148 180 Q 156 215 150 265 L 130 262 Q 132 215 126 190 Z" fill="url(#p-scrubs)" stroke="#0a2828" stroke-width="1.4"/>
  <!-- Hands -->
  <ellipse cx="56" cy="272" r="10" fill="url(#p-skin)" stroke="#8a5a2a" stroke-width="1"/>
  <ellipse cx="144" cy="272" r="10" fill="url(#p-skin)" stroke="#8a5a2a" stroke-width="1"/>

  <!-- TORSO — scrubs top -->
  <path d="M 54 180 Q 56 156 100 150 Q 144 156 146 180 L 146 272 Q 100 280 54 272 Z"
        fill="url(#p-scrubs)" stroke="#0a2828" stroke-width="1.6"/>
  <!-- V-neck opening -->
  <path d="M 88 154 L 100 188 L 112 154 L 110 170 L 100 196 L 90 170 Z" fill="#133838"/>
  <!-- V-neck trim -->
  <path d="M 88 154 L 100 188 L 112 154" stroke="#9fd9d4" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Scrubs pocket -->
  <rect x="112" y="232" width="30" height="24" rx="2" fill="none" stroke="#1c4646" stroke-width="1.2"/>
  <!-- ID badge -->
  <rect x="60" y="212" width="30" height="18" rx="2" fill="#f4efde" stroke="#1c4646" stroke-width="1"/>
  <rect x="62" y="214" width="26" height="5" fill="#3a7b7b"/>
  <rect x="64" y="222" width="22" height="1.5" fill="#a8a898"/>
  <rect x="64" y="225" width="16" height="1.5" fill="#a8a898"/>
  <!-- Stethoscope -->
  <path d="M 78 152 Q 60 180 80 240 L 90 240 Q 74 180 86 152 Z" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M 122 152 Q 140 180 120 240 L 110 240 Q 126 180 114 152 Z" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="85" cy="244" r="6" fill="#2a2a2a" stroke="#0a0a0a" stroke-width="1"/>
  <circle cx="115" cy="244" r="6" fill="#2a2a2a" stroke="#0a0a0a" stroke-width="1"/>

  <!-- NECK -->
  <rect x="89" y="126" width="22" height="26" rx="4" fill="url(#p-skin)" stroke="#8a5a2a" stroke-width="1.2"/>
  <path d="M 89 140 Q 100 150 111 140 L 111 152 L 89 152 Z" fill="#8e5a30" opacity="0.55"/>

  <!-- HEAD -->
  <ellipse cx="100" cy="78" rx="38" ry="44" fill="url(#p-skin)" stroke="#8a5a2a" stroke-width="1.4"/>

  <!-- Hair (slicked back to bun) -->
  <path d="M 64 56 Q 68 26 100 24 Q 132 26 136 56 Q 138 74 130 78 Q 128 58 116 52 Q 100 46 84 52 Q 72 58 70 78 Q 62 74 64 56 Z"
        fill="#2a1810" stroke="#050302" stroke-width="1"/>
  <!-- Hair strands pulled back -->
  <path d="M 72 68 Q 100 52 128 68" stroke="#1a0806" stroke-width="1.4" fill="none" opacity="0.6"/>
  <!-- Bun base -->
  <ellipse cx="100" cy="44" rx="22" ry="5" fill="#1a0806"/>

  <!-- Ears -->
  <ellipse cx="62" cy="84" rx="4" ry="7" fill="url(#p-skin)" stroke="#8a5a2a" stroke-width="1"/>
  <ellipse cx="138" cy="84" rx="4" ry="7" fill="url(#p-skin)" stroke="#8a5a2a" stroke-width="1"/>
  <!-- Earrings -->
  <circle cx="62" cy="89" r="1.6" fill="#e8c85c"/>
  <circle cx="138" cy="89" r="1.6" fill="#e8c85c"/>

  <!-- Cheeks -->
  <ellipse cx="76" cy="88" rx="8" ry="5" fill="#d86050" opacity="0.3"/>
  <ellipse cx="124" cy="88" rx="8" ry="5" fill="#d86050" opacity="0.3"/>

  <!-- EYES — direct, alert -->
  <ellipse cx="84" cy="84" rx="6" ry="3.2" fill="#f4ebda" stroke="#0a0806" stroke-width="1"/>
  <ellipse cx="116" cy="84" rx="6" ry="3.2" fill="#f4ebda" stroke="#0a0806" stroke-width="1"/>
  <circle cx="84" cy="84" r="2.4" fill="#2a1810"/>
  <circle cx="116" cy="84" r="2.4" fill="#2a1810"/>
  <!-- Brows confident level -->
  <path d="M 78 74 L 92 73" stroke="#1a0806" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 108 73 L 122 74" stroke="#1a0806" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M 98 94 Q 96 108 100 112 Q 104 108 102 94" stroke="#9e6a3e" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Mouth — warm smile -->
  <path d="M 92 120 Q 100 126 108 120" stroke="#5a2a1a" stroke-width="1.7" fill="none" stroke-linecap="round"/>
</svg>
